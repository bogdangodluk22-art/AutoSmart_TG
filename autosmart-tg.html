<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AutoSmart — Андрій Мельник</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #c8a96e;
    --gold-light: #e8c97e;
    --dark: #0a0a0f;
    --dark-2: #111118;
    --dark-3: #1a1a24;
    --dark-4: #22222f;
    --text: #f0ece4;
    --text-muted: #8a8799;
    --accent: #2196f3;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* ── VIDEO ZONE ── */
  #video-zone {
    position: relative;
    flex: 0 0 52%;
    background: #000;
    overflow: hidden;
  }

  #video-zone video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* gradient overlay bottom of video */
  #video-zone::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to bottom, transparent, var(--dark));
    pointer-events: none;
  }

  /* status badge */
  #status-badge {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,15,0.7);
    border: 1px solid rgba(200,169,110,0.3);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    transition: all 0.4s ease;
    z-index: 10;
    white-space: nowrap;
  }

  #status-badge.active { border-color: rgba(200,169,110,0.8); background: rgba(200,169,110,0.15); }
  #status-badge.speaking { border-color: rgba(33,150,243,0.8); background: rgba(33,150,243,0.15); color: #64b5f6; }
  #status-badge.el-active { border-color: rgba(200,169,110,0.8); background: rgba(200,169,110,0.12); color: var(--gold-light); }

  /* name plate */
  #nameplate {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 10;
  }
  #nameplate .name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  #nameplate .title {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* audio visualizer */
  #audio-viz {
    position: absolute;
    bottom: 20px;
    right: 16px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
  #audio-viz.active { opacity: 1; }
  #audio-viz span {
    display: block;
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    animation: viz 0.8s ease-in-out infinite alternate;
  }
  #audio-viz span:nth-child(1) { height: 8px; animation-delay: 0s; }
  #audio-viz span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  #audio-viz span:nth-child(3) { height: 22px; animation-delay: 0.05s; }
  #audio-viz span:nth-child(4) { height: 14px; animation-delay: 0.2s; }
  #audio-viz span:nth-child(5) { height: 10px; animation-delay: 0.1s; }
  @keyframes viz {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  /* ── MODE SWITCHER ── */
  #mode-switcher {
    display: flex;
    gap: 0;
    margin: 12px 16px 0;
    background: var(--dark-3);
    border-radius: 10px;
    padding: 3px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .mode-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mode-btn.active {
    background: var(--dark-4);
    color: var(--gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mode-btn svg { width: 14px; height: 14px; }

  /* ── CHAT ZONE ── */
  #chat-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 8px 0 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: none;
  }
  #messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.andrii {
    background: var(--dark-3);
    border: 1px solid rgba(200,169,110,0.15);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    color: var(--text);
  }
  .msg.andrii .msg-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Courier New', monospace;
  }
  .msg.user {
    background: linear-gradient(135deg, #1a3a5c, #0d2840);
    border: 1px solid rgba(33,150,243,0.2);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    color: var(--text);
  }

  /* typing indicator */
  .msg.typing-msg {
    background: var(--dark-3);
    border: 1px solid rgba(200,169,110,0.15);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
  }
  .typing-dots { display: flex; gap: 4px; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT ZONE ── */
  #input-zone {
    padding: 10px 16px 16px;
    background: var(--dark);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* TEXT MODE */
  #text-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #text-input {
    flex: 1;
    background: var(--dark-3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: Georgia, serif;
    resize: none;
    max-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #text-input::placeholder { color: var(--text-muted); }
  #text-input:focus { border-color: rgba(200,169,110,0.4); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #a07840);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 16px; height: 16px; }

  /* ── VOICE MODE — ElevenLabs zone ── */
  #voice-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #voice-controls.active { display: flex; }

  /* ElevenLabs widget — поза екраном але повністю функціональний */
  #el-widget-wrap {
    position: fixed;
    bottom: -9999px;
    right: 20px;
    z-index: 1;
    /* widget рендериться нормально, просто не видний */
  }
  /* Ховаємо весь нативний UI widget через ::part або загальний override */
  elevenlabs-convai {
    /* Приховуємо floating button і весь overlay */
    --elevenlabs-convai-button-display: none;
  }
  elevenlabs-convai::part(button) { display: none !important; }
  elevenlabs-convai::part(overlay) { display: none !important; }
  #el-click-overlay { display: none; }

  /* Наша кастомна кнопка виклику */
  #call-btn {
    width: 68px; height: 68px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #8a5a20);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(200,169,110,0.3);
    transition: all 0.2s;
    position: relative;
  }
  #call-btn.connected {
    background: linear-gradient(135deg, #ef5350, #b71c1c);
    box-shadow: 0 4px 24px rgba(239,83,80,0.45);
  }
  #call-btn.connected::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(239,83,80,0.4);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  #call-btn.speaking-pulse::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(200,169,110,0.2);
    animation: pulse-ring 2s ease-out infinite 0.5s;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  #call-btn svg { width: 28px; height: 28px; }
  #call-btn:active { transform: scale(0.95); }

  #call-hint {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    text-align: center;
    transition: color 0.3s;
  }
  #call-hint.live { color: var(--gold); }

  /* Voice info tip */
  #voice-tip {
    font-size: 10px;
    color: rgba(138,135,153,0.6);
    letter-spacing: 0.5px;
    font-family: 'Courier New', monospace;
    text-align: center;
  }

  /* ── INTRO OVERLAY ── */
  #intro-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    transition: opacity 0.6s ease;
  }
  #intro-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #intro-video-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #intro-video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  #intro-video-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--dark));
    pointer-events: none;
  }
  #intro-bottom {
    padding: 20px 24px 32px;
    text-align: center;
  }
  #intro-bottom .intro-name {
    font-size: 22px;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  #intro-bottom .intro-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'Courier New', monospace;
  }
  #intro-bottom .intro-msg {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  #start-btn {
    background: linear-gradient(135deg, var(--gold), #8a5a20);
    border: none;
    border-radius: 28px;
    padding: 14px 40px;
    color: #000;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(200,169,110,0.3);
  }
  #start-btn:active { transform: scale(0.97); }

  /* ── LOGO ── */
  #logo {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="app">

  <!-- INTRO OVERLAY -->
  <div id="intro-overlay">
    <div id="intro-video-wrap">
      <video id="intro-video" playsinline muted autoplay>
        <source src="https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Intro.mp4" type="video/mp4">
      </video>
    </div>
    <div id="intro-bottom">
      <div class="intro-name">Андрій Мельник</div>
      <div class="intro-title">Co-Founder · AutoSmart</div>
      <div class="intro-msg">Вітаю! Я ваш особистий автоексперт.<br>Який автомобіль вашої мрії?</div>
      <button id="start-btn">Розпочати консультацію</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="video-zone">
    <span id="logo">AutoSmart</span>
    <div id="status-badge">● Очікування</div>
    <video id="main-video" playsinline loop muted>
      <source id="main-src" src="https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Speaking.mp4" type="video/mp4">
    </video>
    <div id="nameplate">
      <div class="name">Андрій Мельник</div>
      <div class="title">Автоексперт · AutoSmart</div>
    </div>
    <div id="audio-viz">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- MODE SWITCHER -->
  <div id="mode-switcher">
    <button class="mode-btn active" id="btn-text" onclick="setMode('text')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Текст
    </button>
    <button class="mode-btn" id="btn-voice" onclick="setMode('voice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
      </svg>
      Голос
    </button>
  </div>

  <!-- CHAT -->
  <div id="chat-zone">
    <div id="messages"></div>

    <div id="input-zone">
      <!-- TEXT MODE -->
      <div id="text-input-row">
        <textarea id="text-input" rows="1" placeholder="Напишіть питання про авто..."></textarea>
        <button id="send-btn" onclick="sendText()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- VOICE MODE -->
      <div id="voice-controls">
        <button id="call-btn" onclick="toggleCall()">
          <!-- Mic icon (idle) -->
          <svg id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
          </svg>
          <!-- End call icon (during call) -->
          <svg id="icon-end" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
        </button>
        <div id="call-hint">Натисніть щоб подзвонити</div>
        <div id="voice-tip">Голосовий дзвінок з Андрієм</div>
      </div>
    </div>
  </div>

  <!-- ElevenLabs widget — тимчасово видимий для кліку, потім ховаємо через CSS поверх -->
  <div id="el-widget-wrap">
    <elevenlabs-convai agent-id="agent_0601kptnnsxxf9vv9wpz4gahq0rn"></elevenlabs-convai>
  </div>

  <!-- Прозорий overlay поверх widget для перехоплення кліків нашою кнопкою -->
  <div id="el-click-overlay"></div>

</div>

<script>
// ── CONFIG ──
const N8N_WEBHOOK = 'https://n8n.srv1421181.hstgr.cloud/webhook/autosmart-andrii';
const EL_AGENT_ID = 'agent_0601kptnnsxxf9vv9wpz4gahq0rn';
const VIDEOS = {
  speaking: 'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Speaking.mp4',
  typing:   'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Typing.mp4',
};

// ── TELEGRAM INIT ──
let userId = 'tg_guest_' + Date.now();
try {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    if (tg.initDataUnsafe?.user?.id) {
      userId = String(tg.initDataUnsafe.user.id);
    }
  }
} catch(e) {}

// ── STATE ──
let mode = 'text';
let isBusy = false;
let elConnected = false;  // чи активний ElevenLabs дзвінок

// ── ELEVENLABS WIDGET INTEGRATION ──
let elWidget = null;

function getElWidget() {
  if (!elWidget) {
    elWidget = document.querySelector('elevenlabs-convai');
  }
  return elWidget;
}

// Слухаємо події від ElevenLabs widget
document.addEventListener('elevenlabs-convai:call-started', () => {
  elConnected = true;
  onCallStarted();
});

document.addEventListener('elevenlabs-convai:call-ended', () => {
  elConnected = false;
  onCallEnded();
});

document.addEventListener('elevenlabs-convai:agent-speaking', () => {
  setStatus('speaking');
  audioViz.classList.add('active');
  document.getElementById('call-btn').classList.add('speaking-pulse');
});

document.addEventListener('elevenlabs-convai:agent-not-speaking', () => {
  if (elConnected) {
    setStatus('el-active');
    audioViz.classList.remove('active');
    document.getElementById('call-btn').classList.remove('speaking-pulse');
  }
});

function onCallStarted() {
  const btn = document.getElementById('call-btn');
  btn.classList.add('connected');
  btn.classList.remove('speaking-pulse');
  document.getElementById('icon-mic').style.display = 'none';
  document.getElementById('icon-end').style.display = 'block';
  document.getElementById('call-hint').textContent = 'Натисніть щоб завершити';
  document.getElementById('call-hint').classList.add('live');
  setStatus('el-active');
  startMainVideo('speaking');
}

function onCallEnded() {
  const btn = document.getElementById('call-btn');
  btn.classList.remove('connected');
  btn.classList.remove('speaking-pulse');
  document.getElementById('icon-mic').style.display = 'block';
  document.getElementById('icon-end').style.display = 'none';
  document.getElementById('call-hint').textContent = 'Натисніть щоб подзвонити';
  document.getElementById('call-hint').classList.remove('live');
  audioViz.classList.remove('active');
  setStatus('idle');
}

function toggleCall() {
  const widget = getElWidget();
  if (!widget) {
    console.warn('EL widget not found');
    return;
  }

  if (!elConnected) {
    startElCall(widget);
  } else {
    endElCall(widget);
  }
}

function startElCall(widget) {
  // Спроба 1: прямий JS API
  if (typeof widget.startSession === 'function') { widget.startSession(); return; }
  if (typeof widget.startCall === 'function') { widget.startCall(); return; }
  // Спроба 2: точний селектор по aria-label (з діагностики)
  const shadow = widget.shadowRoot;
  if (shadow) {
    const btn = shadow.querySelector('button[aria-label="Start a call"]') || shadow.querySelector('button');
    if (btn) { console.log('Clicking:', btn); btn.click(); return; }
  }
  console.warn('Start button not found');
}

function endElCall(widget) {
  if (typeof widget.endSession === 'function') { widget.endSession(); return; }
  if (typeof widget.endCall === 'function') { widget.endCall(); return; }
  const shadow = widget.shadowRoot;
  if (shadow) {
    // Під час дзвінку кнопка змінює aria-label на 'End call'
    const btn = shadow.querySelector('button[aria-label="End call"]')
              || shadow.querySelector('button[aria-label="end call"]')
              || shadow.querySelector('button');
    if (btn) { console.log('Ending via:', btn); btn.click(); return; }
  }
  console.warn('End button not found');
}

function clickWidgetButton(widget, keywords) {
  // Залишаємо як резервний fallback
  const shadow = widget.shadowRoot;
  if (!shadow) return;
  const btn = shadow.querySelector('button');
  if (btn) btn.click();
}

// ── INTRO ──
const introVideo = document.getElementById('intro-video');
const introOverlay = document.getElementById('intro-overlay');

document.getElementById('start-btn').addEventListener('click', () => {
  introOverlay.classList.add('hidden');
  setTimeout(() => { introOverlay.style.display = 'none'; }, 600);
  startMainVideo('speaking');
  addMessage('andrii', 'Вітаю! Я Андрій Мельник, Co-Founder AutoSmart. У нас 20 преміальних авто з 4 країн. Який автомобіль вашої мрії?');
});

// ── VIDEO CONTROL ──
const mainVideo = document.getElementById('main-video');
const mainSrc = document.getElementById('main-src');

function startMainVideo(state) {
  const url = VIDEOS[state] || VIDEOS.speaking;
  if (mainSrc.src !== url) {
    mainSrc.src = url;
    mainVideo.load();
  }
  mainVideo.play().catch(() => {});
}

// ── STATUS ──
const statusBadge = document.getElementById('status-badge');
const audioViz = document.getElementById('audio-viz');

function setStatus(s) {
  statusBadge.className = '';
  if (s === 'typing') {
    statusBadge.textContent = '● Друкує відповідь';
    statusBadge.classList.add('active');
    startMainVideo('typing');
    audioViz.classList.remove('active');
  } else if (s === 'speaking') {
    statusBadge.textContent = '● Відповідає';
    statusBadge.classList.add('speaking');
    startMainVideo('speaking');
    audioViz.classList.add('active');
  } else if (s === 'el-active') {
    statusBadge.textContent = '● Дзвінок активний';
    statusBadge.classList.add('el-active');
    startMainVideo('speaking');
  } else {
    statusBadge.textContent = '● Очікування';
    startMainVideo('speaking');
    audioViz.classList.remove('active');
  }
}

// ── MODE SWITCH ──
function setMode(m) {
  mode = m;
  document.getElementById('btn-text').classList.toggle('active', m === 'text');
  document.getElementById('btn-voice').classList.toggle('active', m === 'voice');
  document.getElementById('text-input-row').style.display = m === 'text' ? 'flex' : 'none';
  const vc = document.getElementById('voice-controls');
  m === 'voice' ? vc.classList.add('active') : vc.classList.remove('active');

  // Якщо переключились на текст під час дзвінку — завершуємо дзвінок
  if (m === 'text' && elConnected) {
    toggleCall();
  }
}

// ── MESSAGES ──
const messagesEl = document.getElementById('messages');

function addMessage(who, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  if (who === 'andrii') {
    div.innerHTML = '<div class="msg-label">Андрій</div>' + escHtml(text);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg typing-msg';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── TEXT MODE ──
const textInput = document.getElementById('text-input');

textInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

textInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

async function sendText() {
  const text = textInput.value.trim();
  if (!text || isBusy) return;

  isBusy = true;
  textInput.value = '';
  textInput.style.height = 'auto';

  addMessage('user', text);
  addTypingIndicator();
  setStatus('typing');

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        source: 'text',
        user_id: userId,
        mode: 'text'
      })
    });
    const data = await res.json();
    removeTypingIndicator();
    const reply = data.reply || data.text || 'Дякую за питання. Дозвольте уточнити деталі.';
    addMessage('andrii', reply);
    setStatus('idle');
  } catch(e) {
    removeTypingIndicator();
    addMessage('andrii', 'Вибачте, виникла помилка. Спробуйте ще раз.');
    setStatus('idle');
  }

  isBusy = false;
}

// ── INIT ──
setMode('text');
setStatus('idle');

    const style = document.createElement('style');
