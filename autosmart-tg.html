<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AutoSmart — Андрій Мельник</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #c8a96e;
    --gold-light: #e8c97e;
    --dark: #0a0a0f;
    --dark-2: #111118;
    --dark-3: #1a1a24;
    --dark-4: #22222f;
    --text: #f0ece4;
    --text-muted: #8a8799;
    --accent: #2196f3;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* Spacer щоб відео займало верхню частину, контент внизу */
  #video-spacer {
    flex: 1;
    min-height: 0;
  }

  /* ── VIDEO ZONE — на весь екран ── */
  #video-zone {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 0;
  }

  #video-zone video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  /* Градієнт знизу для читабельності тексту */
  #video-zone::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to bottom, transparent 0%, rgba(10,10,15,0.7) 60%, rgba(10,10,15,0.92) 100%);
    pointer-events: none;
  }

  /* status badge */
  #status-badge {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,15,0.7);
    border: 1px solid rgba(200,169,110,0.3);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    transition: all 0.4s ease;
    z-index: 20;
    white-space: nowrap;
  }

  #status-badge.active { border-color: rgba(200,169,110,0.8); background: rgba(200,169,110,0.15); }
  #status-badge.speaking { border-color: rgba(33,150,243,0.8); background: rgba(33,150,243,0.15); color: #64b5f6; }

  /* name plate */
  #nameplate {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 5;
  }
  #nameplate .name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  #nameplate .title {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* audio visualizer */
  #audio-viz {
    position: absolute;
    bottom: 20px;
    right: 16px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
  #audio-viz.active { opacity: 1; }
  #audio-viz span {
    display: block;
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    animation: viz 0.8s ease-in-out infinite alternate;
  }
  #audio-viz span:nth-child(1) { height: 8px; animation-delay: 0s; }
  #audio-viz span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  #audio-viz span:nth-child(3) { height: 22px; animation-delay: 0.05s; }
  #audio-viz span:nth-child(4) { height: 14px; animation-delay: 0.2s; }
  #audio-viz span:nth-child(5) { height: 10px; animation-delay: 0.1s; }
  @keyframes viz {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  /* ── MODE SWITCHER — завжди зверху ── */
  #mode-switcher {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    margin: 44px 16px 0;
    background: rgba(10,10,15,0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 10px;
    padding: 3px;
    border: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .mode-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mode-btn.active {
    background: rgba(34,34,47,0.7);
    color: var(--gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mode-btn svg { width: 14px; height: 14px; }

  /* ── CHAT ZONE — поверх відео ── */
  #chat-zone {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 6px 0 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: none;
  }
  #messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.andrii {
    background: rgba(26,26,36,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(200,169,110,0.2);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    color: var(--text);
  }
  .msg.andrii .msg-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Courier New', monospace;
  }
  .msg.user {
    background: linear-gradient(135deg, #1a3a5c, #0d2840);
    border: 1px solid rgba(33,150,243,0.2);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    color: var(--text);
  }

  /* typing indicator */
  .msg.typing-msg {
    background: rgba(26,26,36,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(200,169,110,0.15);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
  }
  .typing-dots { display: flex; gap: 4px; padding: 2px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT ZONE — прозорий, поверх відео ── */
  #input-zone {
    padding: 8px 16px 10px;
    background: transparent;
    border-top: none;
  }

  /* TEXT MODE */
  #text-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #text-input {
    flex: 1;
    background: rgba(10,10,15,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: Georgia, serif;
    resize: none;
    max-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #text-input::placeholder { color: rgba(138,135,153,0.7); }
  #text-input:focus { border-color: rgba(200,169,110,0.5); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #a07840);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn svg { width: 16px; height: 16px; }

  /* VOICE MODE */
  #voice-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #voice-controls.active { display: flex; }

  /* У голосовому режимі — чат прихований, кнопка знизу */
  #app.voice-mode #messages { display: none; }
  #app.voice-mode #chat-zone { justify-content: flex-end; }
  #app.voice-mode #video-spacer { flex: 1; }

  #call-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #8a5a20);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(200,169,110,0.3);
    transition: all 0.2s;
    position: relative;
  }
  #call-btn.listening {
    background: linear-gradient(135deg, #ef5350, #b71c1c);
    box-shadow: 0 4px 20px rgba(239,83,80,0.4);
  }
  #call-btn.listening::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(239,83,80,0.4);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  #call-btn svg { width: 26px; height: 26px; }
  #call-btn:active { transform: scale(0.95); }

  #call-hint {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }

  /* ── INTRO OVERLAY ── */
  #intro-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    transition: opacity 0.6s ease;
  }
  #intro-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #intro-video-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #intro-video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  #intro-video-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--dark));
    pointer-events: none;
  }
  #intro-bottom {
    padding: 20px 24px 32px;
    text-align: center;
  }
  #intro-bottom .intro-name {
    font-size: 22px;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  #intro-bottom .intro-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'Courier New', monospace;
  }
  #intro-bottom .intro-msg {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  #start-btn {
    background: linear-gradient(135deg, var(--gold), #8a5a20);
    border: none;
    border-radius: 28px;
    padding: 14px 40px;
    color: #000;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(200,169,110,0.3);
  }
  #start-btn:active { transform: scale(0.97); }

  /* ── LOGO ── */
  #logo {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 20;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }
  #logo .auto { color: #4da6ff; }
  #logo .smart { color: #e8a020; }
</style>
</head>
<body>

<div id="app">

  <!-- INTRO OVERLAY -->
  <div id="intro-overlay">
    <div id="intro-video-wrap">
      <video id="intro-video" playsinline muted autoplay>
        <source src="https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Intro.mp4" type="video/mp4">
      </video>
    </div>
    <div id="intro-bottom">
      <div class="intro-name">Андрій Мельник</div>
      <div class="intro-title">Co-Founder · AutoSmart</div>
      <div class="intro-msg">Вітаю! Я ваш особистий автоексперт.<br>Який автомобіль вашої мрії?</div>
      <button id="start-btn">Розпочати консультацію</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="video-zone">
    <span id="logo"><span class="auto">AUTO</span><span class="smart"> SMART</span></span>
    <div id="status-badge">● Очікування</div>
    <video id="main-video" playsinline loop muted>
      <source id="main-src" src="https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Speaking.mp4" type="video/mp4">
    </video>
    <!-- nameplate прибрано — залишається тільки в Intro -->
    <div id="audio-viz">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- MODE SWITCHER — завжди зверху, одразу під status badge -->
  <div id="mode-switcher">
    <button class="mode-btn active" id="btn-text" onclick="setMode('text')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Текст
    </button>
    <button class="mode-btn" id="btn-voice" onclick="setMode('voice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
      </svg>
      Голос
    </button>
  </div>

  <!-- Spacer — займає простір між switcher і контентом -->
  <div id="video-spacer"></div>

  <!-- CHAT -->
  <div id="chat-zone">
    <div id="messages"></div>

    <div id="input-zone">
      <!-- TEXT MODE -->
      <div id="text-input-row">
        <textarea id="text-input" rows="1" placeholder="Напишіть питання про авто..."></textarea>
        <button id="send-btn" onclick="sendText()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- VOICE MODE -->
      <div id="voice-controls">
        <button id="call-btn" onclick="toggleVoice()">
          <svg id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
          </svg>
        </button>
        <div id="call-hint">Натисніть щоб говорити</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──
const N8N_WEBHOOK = 'https://n8n.srv1421181.hstgr.cloud/webhook/autosmart-andrii';
const VIDEOS = {
  speaking:      'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Speaking.mp4',
  typing:        'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Typing.mp4',
  startChating:  'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Start%20Chating.mp4',
  watching:      'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Watching.mp4',
  startTalking:  'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Start%20Talking.mp4',
  waiting:       'https://raw.githubusercontent.com/bogdangodluk22-art/AutoSmart_TG/main/Waiting.mp4',
};

// ── TELEGRAM INIT ──
let userId = 'tg_guest_' + Date.now();
try {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    if (tg.initDataUnsafe?.user?.id) {
      userId = String(tg.initDataUnsafe.user.id);
    }
  }
} catch(e) {}

// ── STATE ──
let mode = 'text';      // 'text' | 'voice'
let isBusy = false;
let isListening = false;
let mediaRecorder = null;
let audioChunks = [];
let recognition = null;

// ── INTRO ──
const introVideo = document.getElementById('intro-video');
const introOverlay = document.getElementById('intro-overlay');

introVideo.addEventListener('ended', () => {
  // video ended — button already visible, do nothing
});

document.getElementById('start-btn').addEventListener('click', () => {
  introOverlay.classList.add('hidden');
  setTimeout(() => { introOverlay.style.display = 'none'; }, 600);
  appStarted = true;
  // Текстовий режим по дефолту → Start Chating → Watching (loop)
  startMainVideo('startChating', false, () => {
    startMainVideo('watching', true);
  });
  addMessage('andrii', 'Вітаю! Я Андрій Мельник, Co-Founder AutoSmart. У нас 20 преміальних авто з 4 країн. Який автомобіль вашої мрії?');
});

// ── VIDEO CONTROL ──
const mainVideo = document.getElementById('main-video');
const mainSrc = document.getElementById('main-src');

function startMainVideo(state, loop = true, onEnded = null) {
  const url = VIDEOS[state];
  if (!url) return;
  if (mainSrc.src !== url) {
    mainSrc.src = url;
    mainVideo.load();
  }
  mainVideo.loop = loop;
  if (onEnded) {
    mainVideo.onended = () => { mainVideo.onended = null; onEnded(); };
  } else {
    mainVideo.onended = null;
  }
  mainVideo.play().catch(() => {});
}

// ── STATUS ──
const statusBadge = document.getElementById('status-badge');
const audioViz = document.getElementById('audio-viz');

function setStatus(s) {
  statusBadge.className = '';
  if (s === 'typing') {
    statusBadge.textContent = '● Друкує відповідь';
    statusBadge.classList.add('active');
    startMainVideo('typing', false, () => {
      startMainVideo('watching', true);
    });
    audioViz.classList.remove('active');
  } else if (s === 'speaking') {
    statusBadge.textContent = '● Відповідає';
    statusBadge.classList.add('speaking');
    startMainVideo('speaking', true);
    audioViz.classList.add('active');
  } else if (s === 'listening') {
    statusBadge.textContent = '● Слухає вас';
    statusBadge.classList.add('active');
    startMainVideo('waiting', true);
    audioViz.classList.remove('active');
  } else {
    // idle
    statusBadge.textContent = '● Очікування';
    // не перемикаємо відео — залишається те що грало (Watching або Waiting)
    audioViz.classList.remove('active');
  }
}

// ── MODE SWITCH ──
let appStarted = false; // флаг — overlay ще відкритий

function setMode(m) {
  mode = m;
  document.getElementById('btn-text').classList.toggle('active', m === 'text');
  document.getElementById('btn-voice').classList.toggle('active', m === 'voice');
  document.getElementById('text-input-row').style.display = m === 'text' ? 'flex' : 'none';
  const vc = document.getElementById('voice-controls');
  m === 'voice' ? vc.classList.add('active') : vc.classList.remove('active');
  document.getElementById('app').classList.toggle('voice-mode', m === 'voice');

  if (!appStarted) return; // overlay ще відкритий — відео не чіпаємо

  if (m === 'text') {
    startMainVideo('startChating', false, () => {
      startMainVideo('watching', true);
    });
  } else {
    startMainVideo('startTalking', false, () => {
      startMainVideo('waiting', true);
    });
  }
}

// ── MESSAGES ──
const messagesEl = document.getElementById('messages');

function addMessage(who, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  if (who === 'andrii') {
    div.innerHTML = '<div class="msg-label">Андрій</div>' + escHtml(text);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg typing-msg';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── TEXT MODE ──
const textInput = document.getElementById('text-input');

textInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

textInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

async function sendText() {
  const text = textInput.value.trim();
  if (!text || isBusy) return;

  isBusy = true;
  textInput.value = '';
  textInput.style.height = 'auto';

  addMessage('user', text);
  addTypingIndicator();
  setStatus('typing');

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        source: 'text',
        user_id: userId,
        mode: 'text'
      })
    });
    const data = await res.json();
    removeTypingIndicator();
    const reply = data.reply || data.text || 'Дякую за питання. Дозвольте уточнити деталі.';
    addMessage('andrii', reply);
    setStatus('idle');
  } catch(e) {
    removeTypingIndicator();
    addMessage('andrii', 'Вибачте, виникла помилка. Спробуйте ще раз.');
    setStatus('idle');
  }

  isBusy = false;
}

// ── VOICE MODE ──
const callBtn = document.getElementById('call-btn');
const callHint = document.getElementById('call-hint');

// AudioContext — створюємо один раз при першому кліку (user gesture)
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Грати base64 MP3 через AudioContext — працює в Telegram без autoplay блокування
function playBase64Audio(base64, onEnded) {
  try {
    const ctx = getAudioCtx();
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer, (buffer) => {
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      source.onended = onEnded;
      source.start(0);
    }, (err) => {
      console.error('Audio decode error:', err);
      onEnded();
    });
  } catch(e) {
    console.error('AudioContext error:', e);
    onEnded();
  }
}

function toggleVoice() {
  if (isBusy) return;
  // Ініціалізуємо AudioContext прямо тут — це user gesture, autoplay дозволено
  getAudioCtx();
  if (!isListening) startListening();
  else stopListening();
}

function startListening() {
  isListening = true;
  callBtn.classList.add('listening');
  callHint.textContent = 'Говоріть зараз...';
  setStatus('listening');

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'uk-UA';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      stopListening();
      if (transcript) sendVoiceText(transcript);
    };
    recognition.onerror = (e) => {
      console.warn('Speech error:', e.error);
      stopListening();
      addMessage('andrii', 'Не вдалося розпізнати. Спробуйте ще раз.');
      setStatus('idle');
    };
    recognition.onend = () => { if (isListening) stopListening(); };
    recognition.start();
  } else {
    stopListening();
    addMessage('andrii', 'Голосовий ввід не підтримується. Використайте текстовий режим.');
    setStatus('idle');
  }
}

function stopListening() {
  isListening = false;
  callBtn.classList.remove('listening');
  callHint.textContent = 'Натисніть щоб говорити';
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

async function sendVoiceText(text) {
  if (!text || isBusy) return;
  isBusy = true;

  // В голосовому режимі — не показуємо typing індикатор, одразу чекаємо відповіді
  statusBadge.className = '';
  statusBadge.textContent = '● Очікування';
  // Waiting вже грає після stopListening

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_id: userId, mode: 'voice' })
    });
    const data = await res.json();
    // немає typing indicator у голосовому режимі — нічого не видаляємо

    const reply = data.reply || data.text || '';
    // У голосовому режимі текст не показуємо — тільки аудіо
    if (data.audio_base64) {
      setStatus('speaking');
      audioViz.classList.add('active');
      playBase64Audio(data.audio_base64, () => {
        audioViz.classList.remove('active');
        statusBadge.className = '';
        statusBadge.textContent = '● Очікування';
        startMainVideo('waiting', true);
        isBusy = false;
      });
    } else {
      setStatus('idle');
      isBusy = false;
    }
  } catch(e) {
    addMessage('andrii', 'Вибачте, виникла помилка. Спробуйте ще раз.');
    startMainVideo('waiting', true);
    isBusy = false;
  }
}

// ── INIT ──
setMode('text');
// Відео стартує тільки після кнопки РОЗПОЧАТИ КОНСУЛЬТАЦІЮ — нічого не грає одразу
</script>
